<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0f172a" />

    <!--
      Backend API base. Por defecto apunta al backend en producción.
      En dev local: cambiar a http://localhost:3000.
      Build pipelines pueden reescribir este meta tag al desplegar.
    -->
    <meta name="api-base" content="https://food.plat.baudity.com" />

    <title>Cargando carta…</title>

    <!-- Tailwind CDN — cero build step. Suficiente para una app de 1 pantalla. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#f97316', // naranja apetecible
                dark: '#c2410c',
              },
            },
            fontFamily: {
              sans: [
                'system-ui',
                '-apple-system',
                'BlinkMacSystemFont',
                'Segoe UI',
                'Roboto',
                'sans-serif',
              ],
            },
          },
        },
      };
    </script>

    <style>
      /* Safe area en iPhones con notch / dynamic island */
      .safe-top { padding-top: max(env(safe-area-inset-top), 0.5rem); }
      .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0.5rem); }

      /* Skeleton shimmer mientras carga el menú */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(
          90deg,
          #f1f5f9 0%,
          #e2e8f0 50%,
          #f1f5f9 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s ease-in-out infinite;
      }

      /* Sticky categorías con backdrop-blur (efecto premium tipo Toast/Square) */
      .sticky-tabs {
        backdrop-filter: saturate(180%) blur(12px);
        -webkit-backdrop-filter: saturate(180%) blur(12px);
      }

      /* Botón principal con leve press feedback */
      .btn-press {
        transition: transform 80ms ease, background-color 120ms ease;
      }
      .btn-press:active { transform: scale(0.97); }

      /* Scroll horizontal sin scrollbar en categorías */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <!--
      =============================================================
      PANTALLA 1 — Loading (skeleton)
      =============================================================
    -->
    <section id="screen-loading" class="min-h-screen safe-top safe-bottom">
      <div class="px-4 pt-6">
        <div class="h-7 w-1/2 rounded-md shimmer"></div>
        <div class="h-4 w-1/3 mt-2 rounded-md shimmer"></div>
      </div>
      <div class="mt-6 px-4 flex gap-2 overflow-x-auto no-scrollbar">
        <div class="h-9 w-20 rounded-full shimmer flex-shrink-0"></div>
        <div class="h-9 w-24 rounded-full shimmer flex-shrink-0"></div>
        <div class="h-9 w-16 rounded-full shimmer flex-shrink-0"></div>
        <div class="h-9 w-28 rounded-full shimmer flex-shrink-0"></div>
      </div>
      <div class="mt-6 px-4 space-y-3">
        <div class="h-24 rounded-2xl shimmer"></div>
        <div class="h-24 rounded-2xl shimmer"></div>
        <div class="h-24 rounded-2xl shimmer"></div>
      </div>
    </section>

    <!--
      =============================================================
      PANTALLA 2 — Error (token inválido, QR desactivado, etc.)
      =============================================================
    -->
    <section
      id="screen-error"
      class="hidden min-h-screen flex flex-col items-center justify-center px-6 text-center safe-top safe-bottom"
    >
      <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mb-5">
        <svg
          class="w-10 h-10 text-red-500"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-bold mb-2">Ups, no podemos cargar la carta</h1>
      <p id="error-message" class="text-slate-600 max-w-xs">
        Pedile al mozo el QR nuevo.
      </p>
      <button
        onclick="location.reload()"
        class="mt-6 px-6 py-3 bg-brand text-white rounded-full font-semibold btn-press"
      >
        Reintentar
      </button>
    </section>

    <!--
      =============================================================
      PANTALLA 3 — Carta (categorías + productos)
      =============================================================
    -->
    <section id="screen-menu" class="hidden min-h-screen pb-28">
      <!-- Header con tenant + destino del QR -->
      <header class="bg-white border-b border-slate-200 safe-top">
        <div class="px-4 py-4">
          <p
            id="tenant-name"
            class="text-xs uppercase tracking-wider text-slate-500 font-semibold"
          ></p>
          <h1 id="qr-label" class="text-xl font-bold mt-0.5"></h1>
        </div>
      </header>

      <!-- Tabs de categorías (sticky en scroll) -->
      <nav
        id="categories-tabs"
        class="sticky top-0 z-10 bg-white/85 sticky-tabs border-b border-slate-200 px-4 py-2.5 flex gap-2 overflow-x-auto no-scrollbar"
      >
        <!-- Tabs se inyectan via JS -->
      </nav>

      <!-- Productos agrupados por categoría -->
      <div id="categories-content" class="px-4 pt-3 pb-6 space-y-6">
        <!-- Se inyecta via JS -->
      </div>

      <!-- Footer fijo: botón ver carrito (visible solo si hay items) -->
      <div
        id="cart-fab"
        class="hidden fixed left-0 right-0 bottom-0 z-20 px-4 safe-bottom"
      >
        <button
          onclick="App.openCart()"
          class="w-full bg-brand hover:bg-brand-dark text-white py-4 rounded-2xl font-bold shadow-2xl btn-press flex items-center justify-between px-5"
        >
          <span class="flex items-center gap-2">
            <span
              id="cart-count"
              class="bg-white/25 px-2.5 py-0.5 rounded-full text-sm font-bold"
            ></span>
            <span>Ver mi pedido</span>
          </span>
          <span id="cart-total" class="text-lg"></span>
        </button>
      </div>
    </section>

    <!--
      =============================================================
      MODAL — Detalle producto (cantidad + notas + add to cart)
      =============================================================
    -->
    <div
      id="modal-product"
      class="hidden fixed inset-0 z-30 bg-black/50 flex items-end sm:items-center justify-center"
      onclick="App.closeProduct(event)"
    >
      <div
        class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl max-h-[90vh] overflow-y-auto safe-bottom"
        onclick="event.stopPropagation()"
      >
        <div id="product-detail" class="p-5">
          <!-- Se inyecta via JS -->
        </div>
      </div>
    </div>

    <!--
      =============================================================
      MODAL — Carrito + checkout
      =============================================================
    -->
    <div
      id="modal-cart"
      class="hidden fixed inset-0 z-30 bg-black/50 flex items-end sm:items-center justify-center"
      onclick="App.closeCart(event)"
    >
      <div
        class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl max-h-[92vh] overflow-y-auto safe-bottom"
        onclick="event.stopPropagation()"
      >
        <div id="cart-detail" class="p-5">
          <!-- Se inyecta via JS -->
        </div>
      </div>
    </div>

    <!--
      =============================================================
      PANTALLA 4 — Tracking del pedido (estado en vivo)
      Reemplaza la pantalla de confirmación estática. Es lo que el
      cliente ve inmediatamente después de enviar, con auto-refresh
      cada 15s para que vea cómo avanza ("aprobado" → "en preparación"
      → "listo") sin tener que preguntar al mesero.
      =============================================================
    -->
    <section
      id="screen-tracking"
      class="hidden min-h-screen safe-top safe-bottom"
    >
      <div class="px-5 pt-8 pb-6">
        <!-- Badge grande del estado actual -->
        <div
          id="track-icon"
          class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-5 transition-colors"
        >
          <!-- icono inyectado por JS -->
        </div>

        <h1 id="track-title" class="text-2xl font-bold text-center mb-1"></h1>
        <p
          id="track-message"
          class="text-slate-600 text-center max-w-xs mx-auto mb-4"
        ></p>

        <p class="text-slate-500 text-xs text-center">
          Pedido
          <span
            id="track-order-number"
            class="font-mono font-bold text-slate-900"
          ></span>
        </p>

        <!-- Timeline visual de estados -->
        <div class="mt-8 mb-6">
          <div id="track-timeline" class="relative pl-8">
            <!-- Steps inyectados por JS -->
          </div>
        </div>

        <!-- Items del pedido (recordatorio) -->
        <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-4">
          <h2 class="font-bold text-sm text-slate-700 mb-2">Tu pedido</h2>
          <div id="track-items" class="space-y-1.5"></div>
          <div
            class="mt-3 pt-3 border-t border-slate-100 flex justify-between font-bold"
          >
            <span>Total</span>
            <span id="track-total" class="text-brand"></span>
          </div>
        </div>

        <!-- Indicador de refresh -->
        <p class="text-xs text-slate-400 text-center mb-4">
          <span id="track-refresh-status">Se actualiza solo cada 15 segundos</span>
        </p>

        <button
          onclick="App.startOver()"
          class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-full font-semibold btn-press"
        >
          Hacer otro pedido
        </button>
      </div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
